<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="900" height="620" viewBox="0 0 900 620"
     xmlns="http://www.w3.org/2000/svg"
     font-family="Arial" font-size="14">

<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10"
          refX="10" refY="3" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="black"/>
  </marker>
</defs>

<!-- Input -->
<rect x="360" y="20" width="180" height="50" fill="#f2f2f2" stroke="black"/>
<text x="450" y="50" text-anchor="middle">Input Text x</text>

<!-- Prompt Template -->
<rect x="120" y="120" width="200" height="60" fill="#d9edf7" stroke="black"/>
<text x="220" y="145" text-anchor="middle">Prompt Template</text>
<text x="220" y="165" text-anchor="middle">p(x)=T(x,𝒴,ℰ)</text>

<!-- LLM -->
<rect x="120" y="220" width="200" height="60" fill="#d9edf7" stroke="black"/>
<text x="220" y="250" text-anchor="middle">LLM f_LLM</text>

<!-- z output -->
<rect x="120" y="320" width="200" height="60" fill="#ffffff" stroke="black"/>
<text x="220" y="350" text-anchor="middle">z ∈ {0,1}^K</text>

<!-- RoBERTa -->
<rect x="580" y="120" width="200" height="60" fill="#dff0d8" stroke="black"/>
<text x="680" y="145" text-anchor="middle">RoBERTa Encoder</text>
<text x="680" y="165" text-anchor="middle">h=f_RB(x)</text>

<!-- Embedding -->
<rect x="580" y="220" width="200" height="60" fill="#ffffff" stroke="black"/>
<text x="680" y="250" text-anchor="middle">Embedding h ∈ ℝ^768</text>

<!-- Fusion -->
<rect x="360" y="380" width="180" height="60" fill="#fcf8e3" stroke="black"/>
<text x="450" y="405" text-anchor="middle">Feature Fusion</text>
<text x="450" y="425" text-anchor="middle">u = [h ; z]</text>

<!-- MLP -->
<rect x="360" y="470" width="180" height="60" fill="#f2dede" stroke="black"/>
<text x="450" y="500" text-anchor="middle">MLP</text>
<text x="450" y="520" text-anchor="middle">ŷ = f_MLP(u)</text>

<!-- Final Labels -->
<rect x="360" y="560" width="180" height="60" fill="#eeeeee" stroke="black"/>
<text x="450" y="590" text-anchor="middle">Final Labels ŷ</text>

<!-- Arrows -->
<line x1="450" y1="70" x2="220" y2="120" stroke="black" marker-end="url(#arrow)"/>
<line x1="450" y1="70" x2="680" y2="120" stroke="black" marker-end="url(#arrow)"/>

<line x1="220" y1="180" x2="220" y2="220" stroke="black" marker-end="url(#arrow)"/>
<line x1="220" y1="280" x2="220" y2="320" stroke="black" marker-end="url(#arrow)"/>

<line x1="680" y1="180" x2="680" y2="220" stroke="black" marker-end="url(#arrow)"/>

<line x1="220" y1="380" x2="360" y2="410" stroke="black" marker-end="url(#arrow)"/>
<line x1="680" y1="280" x2="540" y2="410" stroke="black" marker-end="url(#arrow)"/>

<line x1="450" y1="440" x2="450" y2="470" stroke="black" marker-end="url(#arrow)"/>
<line x1="450" y1="530" x2="450" y2="560" stroke="black" marker-end="url(#arrow)"/>

</svg>
